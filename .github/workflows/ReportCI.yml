name: ReportCI

on:
  push:
    branches: [ "objdiff" ]
  pull_request:
    branches: [ "objdiff" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: update submods
        run: git submodules update --init --recursive

      - name: get packages
        run: sudo apt-get install -y git make git build-essentials binutils-mips-linux-gnu python3 python3-pip

      - name: generate report
        run: make clean; make splitobjdiff; make buildobjdiff; make generatediffjson; make report

      - name: upload report
        uses: actions/upload-artifact@v4
        with:
          name: US_report
          path: build/report.json
        
